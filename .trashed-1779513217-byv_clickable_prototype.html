
<!DOCTYPE html>
<html>
<head>
<title>BYV App Prototype</title>
<style>
body { font-family: Arial; margin: 0; }
.screen { display: none; padding: 20px; }
.active { display: block; }
button { padding: 10px; margin: 5px; }
.nav { position: fixed; bottom: 0; width: 100%; background: #eee; padding: 10px; }
</style>
<script>
function show(screen){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screen).classList.add('active');
}
</script>
</head>

<body>

<div id="login" class="screen active">
<h2>Login</h2>
<input placeholder="Email"/><br><br>
<input placeholder="Password" type="password"/><br><br>
<button onclick="show('dashboard')">Login</button>
</div>

<div id="dashboard" class="screen">
<h2>Dashboard</h2>
<p>Total Sales: $1200</p>
<p>Fish Farm Status: Good</p>
<button onclick="show('farm')">Go to Farm</button>
<button onclick="show('sales')">Go to Sales</button>
</div>

<div id="farm" class="screen">
<h2>Fish Farming</h2>
<p>Fish Count: 1000</p>
<p>Feed Time: 8:00 AM</p>
<button onclick="alert('Feed fish now!')">Feed Fish</button>
</div>

<div id="sales" class="screen">
<h2>Sales</h2>
<p>Orders: 25</p>
<p>Revenue: $500</p>
<button onclick="alert('New order created')">Add Order</button>
</div>

<div class="nav">
<button onclick="show('dashboard')">Home</button>
<button onclick="show('farm')">Farm</button>
<button onclick="show('sales')">Sales</button>
</div>

</body>
</html>
